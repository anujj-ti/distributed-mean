repos:
  # General
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=500']

  # Python: Ruff
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.7
    hooks:
      - id: ruff
        args: [--fix]
        files: ^workers/
      - id: ruff-format
        files: ^workers/

  # TypeScript: no-console check
  - repo: local
    hooks:
      - id: no-console-log
        name: No console.log in API source
        language: pygrep
        entry: 'console\.log'
        files: ^api/src/(?!.*test).*\.ts$
        args: [--negate]
