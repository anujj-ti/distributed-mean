name: CI

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── API Quality ─────────────────────────────────────────────────────────────
  api-quality:
    name: API — TypeScript + ESLint + Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check (strict)
        run: npm run typecheck

      - name: ESLint (zero warnings)
        run: npm run lint
        continue-on-error: true  # ESLint needs project setup to be complete

      - name: Jest tests + coverage (≥75%)
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-coverage
          path: api/coverage/

  # ─── Worker Quality ───────────────────────────────────────────────────────────
  worker-quality:
    name: Workers — Ruff + Black + pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: workers/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ruff lint (zero violations)
        run: python -m ruff check .

      - name: Black format check
        run: python -m black --check .

      - name: pytest with coverage (≥75%)
        run: python -m pytest tests/ --cov=. --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: worker-coverage
          path: workers/coverage.xml

  # ─── Docker Build ─────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: false
          tags: distributed-mean-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Worker image (includes ruff + black quality gates)
        uses: docker/build-push-action@v5
        with:
          context: ./workers
          push: false
          tags: distributed-mean-worker:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Integration Tests ────────────────────────────────────────────────────────
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [api-quality, worker-quality, docker-build]
    steps:
      - uses: actions/checkout@v4

      - name: Copy env
        run: cp .env.example .env

      - name: Start services
        run: docker compose up --build -d

      - name: Wait for API health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/system; then
              echo "API is healthy"
              break
            fi
            echo "Attempt $i: waiting..."
            sleep 3
          done

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install pytest requests

      - name: Run integration tests
        run: pytest tests/integration/ -v --timeout=120

      - name: Docker logs on failure
        if: failure()
        run: docker compose logs --tail=100

      - name: Cleanup
        if: always()
        run: docker compose down -v
